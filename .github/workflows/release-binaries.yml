# Build platform binaries for npm distribution via @mcptoolshop/npm-launcher.
# Asset naming convention (locked):
#   xrpl-camp-<version>-<os>-<arch>[.exe]
#   checksums-<version>.txt

name: Release Binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            ext: ""
          - os: macos-latest
            target: darwin-arm64
            ext: ""
          - os: macos-13
            target: darwin-x64
            ext: ""
          - os: windows-latest
            target: win-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - run: uv python install 3.12

      - run: uv venv

      - name: Install dependencies + PyInstaller
        run: uv pip install . pyinstaller

      - name: Build binary
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          uv run pyinstaller --onefile --name "xrpl-camp" --console xrpl_camp/__main__.py
          OUTNAME="xrpl-camp-${VERSION}-${{ matrix.target }}${{ matrix.ext }}"
          mv "dist/xrpl-camp${{ matrix.ext }}" "dist/${OUTNAME}"
          echo "ASSET_NAME=${OUTNAME}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/${{ env.ASSET_NAME }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd artifacts
          sha256sum * > "checksums-${VERSION}.txt"
          cat "checksums-${VERSION}.txt"

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
